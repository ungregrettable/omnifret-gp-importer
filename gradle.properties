org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

android.useAndroidX=true
kotlin.code.style=official

# AGP 9 introduced a new KMP-aware Android plugin
# (com.android.kotlin.multiplatform.library). Until it stabilises, opt
# out with the same flags OmniFret uses, so the classic
# com.android.library + Kotlin multiplatform combo still works.
android.builtInKotlin=false
android.newDsl=false
